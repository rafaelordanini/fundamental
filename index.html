<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor IBOV — Valuation, Qualidade & Histórico</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="score.js"></script>
</head>
<body class="bg-gray-50">
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect } = React;
const {
  MARGEM_COMPRA,
  MARGEM_VENDA,
  QUALIDADE_MIN,
  HISTORICO_MIN_TRIMESTRES,
  SEGMENTO_LABEL,
  computeValuation,
} = window.FundamentalScore;

const COLUMNS = [
  { key: "rankScore", label: "Score", fmt: "score" },
  { key: "papel", label: "Papel", fmt: "text" },
  { key: "segmento", label: "Seg.", fmt: "segmento" },
  { key: "cotacao", label: "Cotação", fmt: "brl" },
  { key: "pl", label: "P/L", fmt: "num" },
  { key: "div_yield", label: "DY", fmt: "pct" },
  { key: "roe", label: "ROE", fmt: "pct" },
  { key: "div_liq_pat", label: "DívLíq/PL", fmt: "num" },
  { key: "graham", label: "Justo", fmt: "brl" },
  { key: "margem", label: "Margem", fmt: "pctSigned" },
  { key: "qualidadeHistorica", label: "Hist.", fmt: "history" },
  { key: "qualidade", label: "Qualidade", fmt: "quality" },
  { key: "recomendacao", label: "Sinal", fmt: "badge" },
];

function formatValue(value, fmt) {
  if (value === null || value === undefined || Number.isNaN(value)) return "—";
  if (fmt === "text" || fmt === "badge") return value;
  if (fmt === "brl") return value.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
  if (fmt === "pct") return (value * 100).toLocaleString("pt-BR", { maximumFractionDigits: 1 }) + "%";
  if (fmt === "pctSigned") {
    const sign = value > 0 ? "+" : "";
    return sign + (value * 100).toLocaleString("pt-BR", { maximumFractionDigits: 1 }) + "%";
  }
  return value.toLocaleString("pt-BR", { maximumFractionDigits: 2 });
}

function valueColor(key, value) {
  if (value === null || value === undefined) return "text-gray-400";
  if (key === "margem") {
    if (value >= MARGEM_COMPRA) return "text-emerald-600 font-semibold";
    if (value <= MARGEM_VENDA) return "text-red-600 font-semibold";
    return "text-gray-600";
  }
  if ((key === "roe" || key === "pl") && value < 0) return "text-red-600";
  if (key === "div_liq_pat" && value > 3) return "text-red-600 font-semibold";
  return "text-gray-800";
}

function SegmentoBadge({ value }) {
  if (!value) return <span className="text-gray-400">—</span>;
  const styles = {
    NM: "bg-emerald-100 text-emerald-700 border-emerald-300",
    N2: "bg-blue-100 text-blue-700 border-blue-200",
    N1: "bg-gray-100 text-gray-600 border-gray-200",
    TRAD: "bg-gray-50 text-gray-500 border-gray-200",
  };
  return (
    <span className={"inline-flex items-center gap-0.5 rounded border px-1.5 py-0.5 text-xs font-semibold " + (styles[value] ?? styles.TRAD)} title={SEGMENTO_LABEL[value] ?? value}>
      {value === "NM" ? "🛡 " : ""}{value}
    </span>
  );
}

function ScoreBadge({ value, rank }) {
  if (value === null) return <span className="text-gray-400">—</span>;
  const style = value >= 65 ? "text-emerald-700 bg-emerald-50 border-emerald-200" : value >= 45 ? "text-gray-700 bg-gray-50 border-gray-200" : "text-red-600 bg-red-50 border-red-100";
  return <span className={"inline-flex items-center gap-1 rounded-lg border px-2 py-0.5 text-sm font-bold " + style}>{rank !== null && rank <= 3 ? "🏆 " : ""}{value}</span>;
}

function QualityBar({ score }) {
  if (score === null) return <span className="text-gray-400">—</span>;
  const color = score >= 60 ? "bg-emerald-500" : score >= 40 ? "bg-amber-400" : "bg-red-400";
  return (
    <div className="flex items-center gap-2">
      <div className="h-2 w-16 overflow-hidden rounded-full bg-gray-200"><div className={"h-full " + color} style={{ width: score + "%" }} /></div>
      <span className="text-xs font-medium text-gray-600">{score}</span>
    </div>
  );
}

function HistoryBadge({ row }) {
  if (!row.history) return <span className="text-xs text-gray-400" title="Histórico CVM indisponível">—</span>;
  const score = row.qualidadeHistorica;
  const ready = row.historicoPronto;
  return (
    <span className={"inline-flex rounded-full border px-2 py-0.5 text-xs font-semibold " + (ready ? "border-indigo-200 bg-indigo-50 text-indigo-700" : "border-amber-200 bg-amber-50 text-amber-700")} title={`${row.trimestresHistoricos} trimestres`}>
      {score ?? "—"} · {row.trimestresHistoricos}t
    </span>
  );
}

function RecomendacaoBadge({ row, onDetail }) {
  const styles = {
    Compra: "bg-emerald-100 text-emerald-700 border-emerald-200",
    Venda: "bg-red-100 text-red-700 border-red-200",
    Neutro: "bg-gray-100 text-gray-600 border-gray-200",
    "N/A": "bg-gray-50 text-gray-400 border-gray-100",
  };
  return <button onClick={() => onDetail(row)} className={"inline-flex items-center gap-1 rounded-full border px-2.5 py-0.5 text-xs font-medium transition-transform hover:scale-105 " + styles[row.recomendacao]}>{row.recomendacao}{row.alerta ? " ⚠" : ""}</button>;
}

function ProfitSparkline({ quarters }) {
  const values = (quarters || []).map(q => q.net_income).filter(v => v !== null && v !== undefined);
  if (values.length < 2) return <p className="text-xs text-gray-400">Série trimestral insuficiente.</p>;
  const width = 320, height = 72, pad = 6;
  const min = Math.min(...values, 0), max = Math.max(...values, 0), span = max - min || 1;
  const points = values.map((value, index) => {
    const x = pad + index * (width - 2 * pad) / (values.length - 1);
    const y = pad + (max - value) * (height - 2 * pad) / span;
    return `${x},${y}`;
  }).join(" ");
  const zeroY = pad + max * (height - 2 * pad) / span;
  return (
    <svg viewBox={`0 0 ${width} ${height}`} className="h-20 w-full rounded bg-gray-50" role="img" aria-label="Evolução do lucro líquido trimestral">
      <line x1={pad} y1={zeroY} x2={width - pad} y2={zeroY} stroke="#d1d5db" strokeWidth="1" />
      <polyline points={points} fill="none" stroke="#4f46e5" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
    </svg>
  );
}

function Breakdown({ items, group }) {
  const filtered = items.filter(item => item.group === group);
  if (!filtered.length) return <p className="text-xs text-gray-400">Sem critérios aplicáveis.</p>;
  return <div className="space-y-1">{filtered.map(item => (
    <div key={group + item.label} className="flex items-center justify-between gap-3 text-sm">
      <span className="text-gray-600">{item.label}{item.value ? ` · ${item.value}` : ""}</span>
      <span className={item.pts === 2 ? "whitespace-nowrap text-emerald-600" : item.pts === 1 ? "whitespace-nowrap text-amber-500" : "whitespace-nowrap text-red-500"}>{item.pts === 2 ? "●● bom" : item.pts === 1 ? "●○ ok" : "○○ ruim"}</span>
    </div>
  ))}</div>;
}

function DetailModal({ row, onClose }) {
  if (!row) return null;
  const summary = row.history?.summary;
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-40 p-4" onClick={onClose}>
      <div className="max-h-full w-full max-w-2xl overflow-y-auto rounded-xl bg-white p-5 shadow-xl" onClick={event => event.stopPropagation()}>
        <div className="mb-3 flex items-center justify-between">
          <div><h3 className="flex items-center gap-2 text-lg font-bold text-gray-900">{row.papel} <SegmentoBadge value={row.segmento} /></h3><p className="text-xs text-gray-400">{row.history?.company_name || "Companhia"}</p></div>
          <button onClick={onClose} className="rounded p-1 text-gray-400 hover:bg-gray-100 hover:text-gray-600">✕</button>
        </div>
        <div className="mb-4 grid gap-3 rounded-lg bg-gray-50 p-3 text-sm sm:grid-cols-2">
          <div className="flex justify-between"><span className="text-gray-500">Score de ranking</span><strong>{row.rankScore ?? "—"}/100</strong></div>
          <div className="flex justify-between"><span className="text-gray-500">Qualidade consolidada</span><strong>{row.qualidade ?? "—"}/100</strong></div>
          <div className="flex justify-between"><span className="text-gray-500">Qualidade atual</span><span>{row.qualidadeAtual ?? "—"}/100</span></div>
          <div className="flex justify-between"><span className="text-gray-500">Qualidade histórica</span><span>{row.qualidadeHistorica ?? "—"}/100</span></div>
          <div className="flex justify-between"><span className="text-gray-500">Preço justo ({row.modeloUsado ?? "—"})</span><span>{formatValue(row.graham ?? row.bazin, "brl")}</span></div>
          <div className="flex justify-between"><span className="text-gray-500">Margem de segurança</span><span className={valueColor("margem", row.margem)}>{formatValue(row.margem, "pctSigned")}</span></div>
        </div>

        <div className="grid gap-5 md:grid-cols-2">
          <section><h4 className="mb-2 text-sm font-semibold text-gray-800">Indicadores atuais · peso 65%</h4><Breakdown items={row.breakdown} group="Atual" /></section>
          <section><h4 className="mb-2 text-sm font-semibold text-gray-800">Histórico CVM · peso 35%</h4><Breakdown items={row.breakdown} group="Histórico" /></section>
        </div>

        {summary && <section className="mt-5 border-t pt-4">
          <div className="mb-2 flex items-center justify-between"><h4 className="text-sm font-semibold text-gray-800">Lucro líquido trimestral</h4><span className="text-xs text-gray-400">{summary.quarters_count} trimestres</span></div>
          <ProfitSparkline quarters={row.history.quarters} />
          <div className="mt-3 grid grid-cols-2 gap-2 text-xs sm:grid-cols-4">
            <div className="rounded bg-gray-50 p-2"><span className="block text-gray-400">Trimestres lucrativos</span><strong>{formatValue(summary.profitable_quarters_ratio, "pct")}</strong></div>
            <div className="rounded bg-gray-50 p-2"><span className="block text-gray-400">CAGR receita</span><strong>{formatValue(summary.revenue_cagr, "pctSigned")}</strong></div>
            <div className="rounded bg-gray-50 p-2"><span className="block text-gray-400">ROE TTM</span><strong>{formatValue(summary.roe_ttm, "pct")}</strong></div>
            <div className="rounded bg-gray-50 p-2"><span className="block text-gray-400">Dív. líq./PL histórica</span><strong>{formatValue(summary.net_debt_to_equity, "num")}</strong></div>
          </div>
        </section>}

        {row.vetos.length > 0 && <div className="mt-4 rounded-lg border border-red-200 bg-red-50 p-3"><h4 className="mb-1 text-sm font-semibold text-red-700">⚠ Vetos ativos</h4><ul className="list-inside list-disc text-sm text-red-600">{row.vetos.map(veto => <li key={veto}>{veto}</li>)}</ul></div>}
        {row.alerta && <div className="mt-3 rounded-lg border border-amber-200 bg-amber-50 p-3 text-xs text-amber-700"><strong>Rebaixada a Neutro:</strong> {row.alertReasons.join("; ")}.</div>}
      </div>
    </div>
  );
}

function getDataUrl(filename) {
  const basePath = window.location.pathname.endsWith("/") ? window.location.pathname : window.location.pathname.replace(/[^/]+$/, "");
  const url = new URL("data/" + filename, window.location.origin + basePath);
  url.searchParams.set("v", new Date().toISOString().slice(0, 10));
  return url.toString();
}

function App() {
  const [dados, setDados] = useState(null);
  const [historico, setHistorico] = useState({ companies: {}, data_coleta: "seed" });
  const [erro, setErro] = useState(null);
  const [historyWarning, setHistoryWarning] = useState(null);
  const [search, setSearch] = useState("");
  const [sortKey, setSortKey] = useState("rankScore");
  const [sortAsc, setSortAsc] = useState(false);
  const [detail, setDetail] = useState(null);
  const [soNovoMercado, setSoNovoMercado] = useState(false);
  const [soComHistorico, setSoComHistorico] = useState(false);

  useEffect(() => {
    fetch(getDataUrl("latest.json"))
      .then(response => { if (!response.ok) throw new Error("HTTP " + response.status); return response.json(); })
      .then(setDados)
      .catch(error => setErro(error.message));
    fetch(getDataUrl("history.json"))
      .then(response => { if (!response.ok) throw new Error("HTTP " + response.status); return response.json(); })
      .then(setHistorico)
      .catch(error => setHistoryWarning(error.message));
  }, []);

  const enriched = useMemo(() => {
    if (!dados?.rows) return [];
    const list = dados.rows.map(row => computeValuation({ ...row, history: historico.companies?.[row.papel] || null }));
    const ordered = [...list].sort((a, b) => (b.rankScore ?? -1) - (a.rankScore ?? -1));
    ordered.forEach((row, index) => { row.posicao = row.rankScore !== null ? index + 1 : null; });
    return list;
  }, [dados, historico]);

  const filtered = useMemo(() => {
    const term = search.trim().toUpperCase();
    const result = enriched.filter(row => {
      if (term && !row.papel.includes(term) && !(row.history?.company_name || "").toUpperCase().includes(term)) return false;
      if (soNovoMercado && row.segmento !== "NM") return false;
      if (soComHistorico && !row.historicoPronto) return false;
      return true;
    });
    result.sort((a, b) => {
      const va = a[sortKey], vb = b[sortKey];
      if (va === null || va === undefined) return 1;
      if (vb === null || vb === undefined) return -1;
      if (typeof va === "string") return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
      return sortAsc ? va - vb : vb - va;
    });
    return result;
  }, [enriched, search, sortKey, sortAsc, soNovoMercado, soComHistorico]);

  function toggleSort(key) {
    if (key === sortKey) setSortAsc(!sortAsc);
    else { setSortKey(key); setSortAsc(key === "papel"); }
  }

  if (erro) return <div className="mx-auto mt-16 max-w-md rounded-xl border border-red-200 bg-red-50 p-6 text-center"><p className="font-semibold text-red-700">Não foi possível carregar data/latest.json</p><p className="mt-2 text-sm text-red-600">{erro}</p></div>;
  if (!dados) return <div className="mt-16 text-center text-gray-400">Carregando…</div>;

  const nCompra = enriched.filter(row => row.recomendacao === "Compra").length;
  const nVenda = enriched.filter(row => row.recomendacao === "Venda").length;
  const nRebaixados = enriched.filter(row => row.alerta).length;
  const nHistorico = enriched.filter(row => row.historicoPronto).length;

  return (
    <div className="min-h-screen p-4 md:p-6"><div className="mx-auto max-w-7xl">
      <header className="mb-6 flex flex-col gap-3 md:flex-row md:items-end md:justify-between">
        <div><h1 className="text-2xl font-bold text-gray-900">📈 Monitor IBOV</h1><p className="mt-1 text-sm text-gray-500">Mercado: {dados.data_coleta === "seed" ? "—" : new Date(dados.data_coleta + "T12:00:00").toLocaleDateString("pt-BR")} · Histórico CVM: {historico.data_coleta === "seed" ? "aguardando primeira coleta" : new Date(historico.data_coleta + "T12:00:00").toLocaleDateString("pt-BR")}</p></div>
        <div className="flex flex-col gap-2 sm:flex-row sm:items-center">
          <label className="flex cursor-pointer items-center gap-2 text-sm text-gray-600"><input type="checkbox" checked={soNovoMercado} onChange={event => setSoNovoMercado(event.target.checked)} /> 🛡 Só Novo Mercado</label>
          <label className="flex cursor-pointer items-center gap-2 text-sm text-gray-600"><input type="checkbox" checked={soComHistorico} onChange={event => setSoComHistorico(event.target.checked)} /> ≥ {HISTORICO_MIN_TRIMESTRES} trimestres</label>
          <input type="text" placeholder="🔍 Ticker ou empresa..." value={search} onChange={event => setSearch(event.target.value)} className="w-full rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 sm:w-56" />
        </div>
      </header>

      {historyWarning && <div className="mb-4 rounded-lg border border-amber-200 bg-amber-50 p-3 text-xs text-amber-700">Histórico CVM indisponível ({historyWarning}). O ranking atual aparece, mas nenhuma empresa recebe sinal de compra sem histórico mínimo.</div>}

      <div className="mb-6 grid grid-cols-2 gap-4 sm:grid-cols-5">
        <div className="rounded-xl border border-gray-200 bg-white p-4 shadow-sm"><div className="text-sm text-gray-500">Tickers</div><div className="mt-1 text-2xl font-bold text-gray-900">{enriched.length}</div></div>
        <div className="rounded-xl border border-indigo-200 bg-indigo-50 p-4 shadow-sm"><div className="text-sm text-indigo-700">Com histórico</div><div className="mt-1 text-2xl font-bold text-indigo-700">{nHistorico}</div></div>
        <div className="rounded-xl border border-emerald-200 bg-emerald-50 p-4 shadow-sm"><div className="text-sm text-emerald-700">Compra</div><div className="mt-1 text-2xl font-bold text-emerald-700">{nCompra}</div></div>
        <div className="rounded-xl border border-amber-200 bg-amber-50 p-4 shadow-sm"><div className="text-sm text-amber-700">Rebaixadas ⚠</div><div className="mt-1 text-2xl font-bold text-amber-700">{nRebaixados}</div></div>
        <div className="rounded-xl border border-red-200 bg-red-50 p-4 shadow-sm"><div className="text-sm text-red-700">Venda</div><div className="mt-1 text-2xl font-bold text-red-700">{nVenda}</div></div>
      </div>

      <div className="mb-4 rounded-lg border border-blue-100 bg-blue-50 p-3 text-xs text-blue-800">ℹ <strong>Qualidade consolidada</strong> = 65% indicadores atuais + 35% histórico CVM. O histórico avalia cobertura, lucros recorrentes, crescimento da receita, estabilidade das margens, ROE TTM e tendência da dívida. <strong>Compra</strong> exige margem ≥ +25%, qualidade ≥ {QUALIDADE_MIN}, ao menos {HISTORICO_MIN_TRIMESTRES} trimestres e nenhum veto.</div>

      <div className="overflow-x-auto rounded-xl border border-gray-200 bg-white shadow-sm"><table className="w-full min-w-max text-sm"><thead><tr className="border-b border-gray-200 bg-gray-50">{COLUMNS.map(col => <th key={col.key} onClick={() => toggleSort(col.key)} className="cursor-pointer select-none whitespace-nowrap px-3 py-3 text-left font-semibold text-gray-600 hover:bg-gray-100 hover:text-gray-900">{col.label}{sortKey === col.key ? (sortAsc ? " ↑" : " ↓") : ""}</th>)}</tr></thead><tbody>
        {filtered.map(row => <tr key={row.papel} className="border-b border-gray-100 last:border-0 hover:bg-emerald-50">{COLUMNS.map(col => <td key={col.key} className={"whitespace-nowrap px-3 py-2.5 " + (col.key === "papel" ? "font-semibold text-gray-900" : valueColor(col.key, row[col.key]))}>{col.fmt === "badge" ? <RecomendacaoBadge row={row} onDetail={setDetail} /> : col.fmt === "quality" ? <QualityBar score={row.qualidade} /> : col.fmt === "history" ? <HistoryBadge row={row} /> : col.fmt === "segmento" ? <SegmentoBadge value={row.segmento} /> : col.fmt === "score" ? <ScoreBadge value={row.rankScore} rank={row.posicao} /> : formatValue(row[col.key], col.fmt)}</td>)}</tr>)}
        {filtered.length === 0 && <tr><td colSpan={COLUMNS.length} className="px-3 py-8 text-center text-gray-400">Nenhum ticker encontrado.</td></tr>}
      </tbody></table></div>

      <p className="mt-4 text-xs text-gray-400">Ferramenta educacional de screening quantitativo — <strong>não constitui recomendação de investimento</strong>. Dados atuais: Fundamentus. Histórico: demonstrações consolidadas ITR/DFP da CVM, com cadastro B3.</p>
      <DetailModal row={detail} onClose={() => setDetail(null)} />
    </div></div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
