<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor IBOV — Valuation, Qualidade & Histórico</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="score.js"></script>
</head>
<body class="bg-gray-50">
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect } = React;
const {
  MARGEM_COMPRA,
  MARGEM_VENDA,
  QUALIDADE_MIN,
  HISTORICO_MIN_TRIMESTRES,
  SEGMENTO_LABEL,
  computeDCF,
  getDcfDefaults,
  computeValuation,
} = window.FundamentalScore;

const COLUMNS = [
  { key: "rankScore", label: "Score", fmt: "score" },
  { key: "papel", label: "Papel", fmt: "ticker" },
  { key: "setor", label: "Setor", fmt: "setor" },
  { key: "segmento", label: "Gov.", fmt: "segmento" },
  { key: "cotacao", label: "Cotação", fmt: "brl" },
  { key: "pl", label: "P/L", fmt: "num" },
  { key: "div_yield", label: "DY", fmt: "pct" },
  { key: "roe", label: "ROE", fmt: "pct" },
  { key: "div_liq_pat", label: "DívLíq/PL", fmt: "num" },
  { key: "graham", label: "Justo", fmt: "brl" },
  { key: "margem", label: "Margem", fmt: "pctSigned" },
  { key: "qualidadeHistorica", label: "Hist.", fmt: "history" },
  { key: "qualidade", label: "Qualidade", fmt: "quality" },
  { key: "recomendacao", label: "Sinal", fmt: "badge" },
];

function formatValue(value, fmt) {
  if (value === null || value === undefined || Number.isNaN(value)) return "—";
  if (fmt === "text" || fmt === "badge") return value;
  if (fmt === "brl") return value.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
  if (fmt === "pct") return (value * 100).toLocaleString("pt-BR", { maximumFractionDigits: 1 }) + "%";
  if (fmt === "pctSigned") {
    const sign = value > 0 ? "+" : "";
    return sign + (value * 100).toLocaleString("pt-BR", { maximumFractionDigits: 1 }) + "%";
  }
  return value.toLocaleString("pt-BR", { maximumFractionDigits: 2 });
}

function formatMillion(value) {
  if (!Number.isFinite(value)) return "—";
  return "R$ " + value.toLocaleString("pt-BR", { maximumFractionDigits: 0 }) + " mi";
}

function valueColor(key, value) {
  if (value === null || value === undefined) return "text-gray-400";
  if (key === "margem") {
    if (value >= MARGEM_COMPRA) return "text-emerald-600 font-semibold";
    if (value <= MARGEM_VENDA) return "text-red-600 font-semibold";
    return "text-gray-600";
  }
  if ((key === "roe" || key === "pl") && value < 0) return "text-red-600";
  if (key === "div_liq_pat" && value > 3) return "text-red-600 font-semibold";
  return "text-gray-800";
}

function compareRank(a, b) {
  const scoreDiff = (b.rankScore ?? -1) - (a.rankScore ?? -1);
  if (scoreDiff !== 0) return scoreDiff;
  const qualityDiff = (b.qualidade ?? -1) - (a.qualidade ?? -1);
  if (qualityDiff !== 0) return qualityDiff;
  const marginDiff = (b.margem ?? -Infinity) - (a.margem ?? -Infinity);
  if (marginDiff !== 0) return marginDiff;
  return a.papel.localeCompare(b.papel);
}

function SegmentoBadge({ value }) {
  if (!value) return <span className="text-gray-400">—</span>;
  const styles = {
    NM: "bg-emerald-100 text-emerald-700 border-emerald-300",
    N2: "bg-blue-100 text-blue-700 border-blue-200",
    N1: "bg-gray-100 text-gray-600 border-gray-200",
    TRAD: "bg-gray-50 text-gray-500 border-gray-200",
  };
  return <span className={"inline-flex items-center gap-0.5 rounded border px-1.5 py-0.5 text-xs font-semibold " + (styles[value] ?? styles.TRAD)} title={SEGMENTO_LABEL[value] ?? value}>{value === "NM" ? "🛡 " : ""}{value}</span>;
}

function SectorCell({ row }) {
  return <div className="max-w-48 whitespace-normal leading-tight" title={`${row.setor} — ${row.atividade}`}><div className="text-xs font-semibold text-gray-700">{row.setor}</div><div className="mt-0.5 text-[11px] text-gray-400">{row.atividade}</div></div>;
}

function ScoreBadge({ value, rank }) {
  if (value === null) return <span className="text-gray-400">—</span>;
  const style = value >= 65 ? "text-emerald-700 bg-emerald-50 border-emerald-200" : value >= 45 ? "text-gray-700 bg-gray-50 border-gray-200" : "text-red-600 bg-red-50 border-red-100";
  return <span className={"inline-flex items-center gap-1 rounded-lg border px-2 py-0.5 text-sm font-bold " + style} title={rank ? `${rank}º no recorte atual` : ""}>{rank !== null && rank <= 3 ? "🏆 " : ""}{value}</span>;
}

function QualityBar({ score }) {
  if (score === null) return <span className="text-gray-400">—</span>;
  const color = score >= 60 ? "bg-emerald-500" : score >= 40 ? "bg-amber-400" : "bg-red-400";
  return <div className="flex items-center gap-2"><div className="h-2 w-16 overflow-hidden rounded-full bg-gray-200"><div className={"h-full " + color} style={{ width: score + "%" }} /></div><span className="text-xs font-medium text-gray-600">{score}</span></div>;
}

function HistoryBadge({ row }) {
  if (!row.history) return <span className="text-xs text-gray-400" title="Histórico CVM indisponível">—</span>;
  const ready = row.historicoPronto;
  return <span className={"inline-flex rounded-full border px-2 py-0.5 text-xs font-semibold " + (ready ? "border-indigo-200 bg-indigo-50 text-indigo-700" : "border-amber-200 bg-amber-50 text-amber-700")} title={`${row.trimestresHistoricos} trimestres`}>{row.qualidadeHistorica ?? "—"} · {row.trimestresHistoricos}t</span>;
}

function RecomendacaoBadge({ row, onDetail }) {
  const styles = { Compra: "bg-emerald-100 text-emerald-700 border-emerald-200", Venda: "bg-red-100 text-red-700 border-red-200", Neutro: "bg-gray-100 text-gray-600 border-gray-200", "N/A": "bg-gray-50 text-gray-400 border-gray-100" };
  return <button onClick={() => onDetail(row)} className={"inline-flex items-center gap-1 rounded-full border px-2.5 py-0.5 text-xs font-medium transition-transform hover:scale-105 " + styles[row.recomendacao]}>{row.recomendacao}{row.alerta ? " ⚠" : ""}</button>;
}

function Sparkline({ values, label }) {
  const clean = (values || []).filter(value => Number.isFinite(value));
  if (clean.length < 2) return <p className="text-xs text-gray-400">Série insuficiente.</p>;
  const width = 360, height = 82, pad = 7;
  const min = Math.min(...clean, 0), max = Math.max(...clean, 0), span = max - min || 1;
  const points = clean.map((value, index) => `${pad + index * (width - 2 * pad) / (clean.length - 1)},${pad + (max - value) * (height - 2 * pad) / span}`).join(" ");
  const zeroY = pad + max * (height - 2 * pad) / span;
  return <svg viewBox={`0 0 ${width} ${height}`} className="h-24 w-full rounded bg-gray-50" role="img" aria-label={label}><line x1={pad} y1={zeroY} x2={width - pad} y2={zeroY} stroke="#d1d5db" strokeWidth="1"/><polyline points={points} fill="none" stroke="#4f46e5" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/></svg>;
}

function Breakdown({ items, group }) {
  const filtered = items.filter(item => item.group === group);
  if (!filtered.length) return <p className="text-xs text-gray-400">Sem critérios aplicáveis.</p>;
  return <div className="space-y-1">{filtered.map(item => <div key={group + item.label} className="flex items-center justify-between gap-3 text-sm"><span className="text-gray-600">{item.label}{item.value ? ` · ${item.value}` : ""}</span><span className={item.pts === 2 ? "whitespace-nowrap text-emerald-600" : item.pts === 1 ? "whitespace-nowrap text-amber-500" : "whitespace-nowrap text-red-500"}>{item.pts === 2 ? "●● bom" : item.pts === 1 ? "●○ ok" : "○○ ruim"}</span></div>)}</div>;
}

function AssumptionInput({ label, value, onChange, suffix, min, max, step }) {
  return <label className="text-xs font-semibold text-gray-500">{label}<div className="mt-1 flex items-center rounded-lg border border-gray-300 bg-white"><input type="number" value={value} min={min} max={max} step={step} onChange={event => onChange(Number(event.target.value))} className="w-full rounded-l-lg px-3 py-2 text-sm font-normal text-gray-800 outline-none"/><span className="pr-3 text-xs text-gray-400">{suffix}</span></div></label>;
}

function DcfPanel({ row }) {
  const defaults = useMemo(() => getDcfDefaults(row), [row.papel, row.history?.summary?.revenue_cagr]);
  const [growth, setGrowth] = useState(defaults.growthRate * 100);
  const [discount, setDiscount] = useState(defaults.discountRate * 100);
  const [terminal, setTerminal] = useState(defaults.terminalGrowthRate * 100);
  const [years, setYears] = useState(defaults.years);

  useEffect(() => {
    setGrowth(defaults.growthRate * 100);
    setDiscount(defaults.discountRate * 100);
    setTerminal(defaults.terminalGrowthRate * 100);
    setYears(defaults.years);
  }, [row.papel, defaults.growthRate, defaults.discountRate, defaults.terminalGrowthRate, defaults.years]);

  const assumptions = { growthRate: growth / 100, discountRate: discount / 100, terminalGrowthRate: terminal / 100, years };
  const dcf = useMemo(() => computeDCF(row, assumptions), [row, growth, discount, terminal, years]);

  function applyScenario(type) {
    if (type === "conservative") {
      setGrowth(Math.max(-5, defaults.growthRate * 100 - 3));
      setDiscount(defaults.discountRate * 100 + 2);
      setTerminal(2);
    } else if (type === "optimistic") {
      setGrowth(Math.min(15, defaults.growthRate * 100 + 3));
      setDiscount(Math.max(8, defaults.discountRate * 100 - 2));
      setTerminal(4);
    } else {
      setGrowth(defaults.growthRate * 100);
      setDiscount(defaults.discountRate * 100);
      setTerminal(defaults.terminalGrowthRate * 100);
      setYears(defaults.years);
    }
  }

  if (!dcf.available) {
    return <div className="rounded-xl border border-amber-200 bg-amber-50 p-5"><h4 className="font-semibold text-amber-800">FCD indisponível para este papel</h4><p className="mt-2 text-sm text-amber-700">{dcf.reason}</p><p className="mt-3 text-xs text-amber-600">O histórico precisa conter os novos campos de fluxo de caixa da CVM. Após a primeira execução do workflow atualizado, empresas não financeiras com FCL positivo passarão a exibir o cálculo.</p></div>;
  }

  const sensitivityDiscounts = [discount - 2, discount, discount + 2];
  const sensitivityGrowth = [growth - 2, growth, growth + 2];

  return <div className="space-y-5">
    <div className="rounded-xl border border-indigo-200 bg-indigo-50 p-4">
      <div className="flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between">
        <div><div className="text-xs font-semibold uppercase tracking-wide text-indigo-500">Preço justo por FCD</div><div className="mt-1 text-3xl font-bold text-indigo-800">{formatValue(dcf.fairPrice, "brl")}</div><div className={"mt-1 text-sm font-semibold " + valueColor("margem", dcf.margin)}>Margem: {formatValue(dcf.margin, "pctSigned")}</div></div>
        <div className="grid grid-cols-2 gap-2 text-xs sm:text-right"><div><span className="block text-indigo-400">Cotação</span><strong className="text-indigo-800">{formatValue(row.cotacao, "brl")}</strong></div><div><span className="block text-indigo-400">Confiança</span><strong className="text-indigo-800">{dcf.confidence}</strong></div><div><span className="block text-indigo-400">Valor do patrimônio</span><strong className="text-indigo-800">{formatMillion(dcf.equityValueMillion)}</strong></div><div><span className="block text-indigo-400">Peso da perpetuidade</span><strong className="text-indigo-800">{formatValue(dcf.terminalWeight, "pct")}</strong></div></div>
      </div>
    </div>

    <section>
      <div className="mb-3 flex flex-wrap items-center justify-between gap-2"><h4 className="text-sm font-semibold text-gray-800">Premissas editáveis</h4><div className="flex gap-1"><button onClick={() => applyScenario("conservative")} className="rounded border px-2 py-1 text-xs text-gray-600 hover:bg-gray-50">Conservador</button><button onClick={() => applyScenario("base")} className="rounded border px-2 py-1 text-xs text-gray-600 hover:bg-gray-50">Base</button><button onClick={() => applyScenario("optimistic")} className="rounded border px-2 py-1 text-xs text-gray-600 hover:bg-gray-50">Otimista</button></div></div>
      <div className="grid gap-3 sm:grid-cols-4"><AssumptionInput label="Crescimento anual" value={growth} onChange={setGrowth} suffix="%" min="-20" max="30" step="0.5"/><AssumptionInput label="Taxa de desconto" value={discount} onChange={setDiscount} suffix="%" min="1" max="40" step="0.5"/><AssumptionInput label="Perpetuidade" value={terminal} onChange={setTerminal} suffix="%" min="-5" max="10" step="0.5"/><AssumptionInput label="Anos projetados" value={years} onChange={setYears} suffix="anos" min="3" max="10" step="1"/></div>
    </section>

    <section className="grid gap-3 sm:grid-cols-4">
      <div className="rounded-lg bg-gray-50 p-3 text-xs"><span className="block text-gray-400">FCL normalizado</span><strong>{formatMillion(dcf.baseFreeCashFlowMillion)}</strong></div>
      <div className="rounded-lg bg-gray-50 p-3 text-xs"><span className="block text-gray-400">Anos de FCL</span><strong>{dcf.freeCashFlowYears}</strong></div>
      <div className="rounded-lg bg-gray-50 p-3 text-xs"><span className="block text-gray-400">Anos com FCL positivo</span><strong>{formatValue(dcf.positiveFreeCashFlowYearsRatio, "pct")}</strong></div>
      <div className="rounded-lg bg-gray-50 p-3 text-xs"><span className="block text-gray-400">Ações estimadas</span><strong>{dcf.sharesMillion.toLocaleString("pt-BR", { maximumFractionDigits: 0 })} mi</strong></div>
    </section>

    <section><h4 className="mb-2 text-sm font-semibold text-gray-800">Fluxos projetados</h4><div className="overflow-x-auto rounded-lg border"><table className="w-full text-xs"><thead className="bg-gray-50 text-gray-500"><tr><th className="px-3 py-2 text-left">Ano</th><th className="px-3 py-2 text-right">FCL projetado</th><th className="px-3 py-2 text-right">Valor presente</th></tr></thead><tbody>{dcf.projection.map(item => <tr key={item.year} className="border-t"><td className="px-3 py-2">{item.year}</td><td className="px-3 py-2 text-right">{formatMillion(item.freeCashFlowMillion)}</td><td className="px-3 py-2 text-right">{formatMillion(item.presentValueMillion)}</td></tr>)}</tbody></table></div></section>

    <section><h4 className="mb-2 text-sm font-semibold text-gray-800">Sensibilidade do preço justo</h4><div className="overflow-x-auto rounded-lg border"><table className="w-full text-xs"><thead className="bg-gray-50"><tr><th className="px-3 py-2 text-left">Cresc. \ Desconto</th>{sensitivityDiscounts.map(rate => <th key={rate} className="px-3 py-2 text-right">{rate.toFixed(1)}%</th>)}</tr></thead><tbody>{sensitivityGrowth.map(growthRate => <tr key={growthRate} className="border-t"><td className="px-3 py-2 font-medium">{growthRate.toFixed(1)}%</td>{sensitivityDiscounts.map(discountRate => { const scenario = computeDCF(row, { ...assumptions, growthRate: growthRate / 100, discountRate: discountRate / 100 }); return <td key={discountRate} className="px-3 py-2 text-right">{scenario.available ? formatValue(scenario.fairPrice, "brl") : "—"}</td>; })}</tr>)}</tbody></table></div></section>

    <div className="rounded-lg border border-gray-200 bg-gray-50 p-3 text-xs text-gray-600"><strong>Metodologia:</strong> FCL aproximado = caixa líquido das atividades operacionais + caixa líquido das atividades de investimento. A base é a mediana dos últimos três anos disponíveis; a quantidade de ações é estimada a partir de indicadores por ação. Esse modelo inclui aquisições e outros investimentos e deve ser tratado como faixa de valor, não como preço exato. O FCD ainda não altera o ranking geral.</div>
  </div>;
}

function SummaryPanel({ row }) {
  const summary = row.history?.summary;
  return <div>
    <div className="mb-4 grid gap-3 rounded-lg bg-gray-50 p-3 text-sm sm:grid-cols-2">
      <div className="flex justify-between"><span className="text-gray-500">Posição no recorte</span><strong>{row.posicaoFiltro ?? "—"}º</strong></div>
      <div className="flex justify-between"><span className="text-gray-500">Score de ranking</span><strong>{row.rankScore ?? "—"}/100</strong></div>
      <div className="flex justify-between"><span className="text-gray-500">Qualidade consolidada</span><strong>{row.qualidade ?? "—"}/100</strong></div>
      <div className="flex justify-between"><span className="text-gray-500">Qualidade atual</span><span>{row.qualidadeAtual ?? "—"}/100</span></div>
      <div className="flex justify-between"><span className="text-gray-500">Qualidade histórica</span><span>{row.qualidadeHistorica ?? "—"}/100</span></div>
      <div className="flex justify-between"><span className="text-gray-500">Preço justo ({row.modeloUsado ?? "—"})</span><span>{formatValue(row.graham ?? row.bazin, "brl")}</span></div>
      <div className="flex justify-between"><span className="text-gray-500">Margem de segurança</span><span className={valueColor("margem", row.margem)}>{formatValue(row.margem, "pctSigned")}</span></div>
    </div>
    <div className="grid gap-5 md:grid-cols-2"><section><h4 className="mb-2 text-sm font-semibold text-gray-800">Indicadores atuais · peso 65%</h4><Breakdown items={row.breakdown} group="Atual"/></section><section><h4 className="mb-2 text-sm font-semibold text-gray-800">Histórico CVM · peso 35%</h4><Breakdown items={row.breakdown} group="Histórico"/></section></div>
    {summary && <section className="mt-5 border-t pt-4"><div className="mb-2 flex items-center justify-between"><h4 className="text-sm font-semibold text-gray-800">Lucro líquido trimestral</h4><span className="text-xs text-gray-400">{summary.quarters_count} trimestres</span></div><Sparkline values={row.history.quarters.map(item => item.net_income)} label="Evolução do lucro líquido trimestral"/><div className="mt-3 grid grid-cols-2 gap-2 text-xs sm:grid-cols-5"><div className="rounded bg-gray-50 p-2"><span className="block text-gray-400">Trimestres lucrativos</span><strong>{formatValue(summary.profitable_quarters_ratio, "pct")}</strong></div><div className="rounded bg-gray-50 p-2"><span className="block text-gray-400">CAGR receita</span><strong>{formatValue(summary.revenue_cagr, "pctSigned")}</strong></div><div className="rounded bg-gray-50 p-2"><span className="block text-gray-400">ROE TTM</span><strong>{formatValue(summary.roe_ttm, "pct")}</strong></div><div className="rounded bg-gray-50 p-2"><span className="block text-gray-400">Dív. líq./PL</span><strong>{formatValue(summary.net_debt_to_equity, "num")}</strong></div><div className="rounded bg-gray-50 p-2"><span className="block text-gray-400">Anos de FCL</span><strong>{summary.free_cash_flow_years_count ?? "—"}</strong></div></div></section>}
    {row.vetos.length > 0 && <div className="mt-4 rounded-lg border border-red-200 bg-red-50 p-3"><h4 className="mb-1 text-sm font-semibold text-red-700">⚠ Vetos ativos</h4><ul className="list-inside list-disc text-sm text-red-600">{row.vetos.map(veto => <li key={veto}>{veto}</li>)}</ul></div>}
    {row.alerta && <div className="mt-3 rounded-lg border border-amber-200 bg-amber-50 p-3 text-xs text-amber-700"><strong>Rebaixada a Neutro:</strong> {row.alertReasons.join("; ")}.</div>}
  </div>;
}

function DetailModal({ row, onClose }) {
  const [tab, setTab] = useState("summary");
  useEffect(() => setTab("summary"), [row?.papel]);
  if (!row) return null;
  return <div className="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-40 p-4" onClick={onClose}><div className="max-h-full w-full max-w-4xl overflow-y-auto rounded-xl bg-white p-5 shadow-xl" onClick={event => event.stopPropagation()}>
    <div className="mb-3 flex items-start justify-between"><div><h3 className="flex items-center gap-2 text-lg font-bold text-gray-900">{row.papel} <SegmentoBadge value={row.segmento}/></h3><p className="text-xs text-gray-400">{row.history?.company_name || "Companhia"}</p><p className="mt-1 text-xs font-medium text-indigo-600">{row.setor} · {row.atividade}</p></div><button onClick={onClose} className="rounded p-1 text-gray-400 hover:bg-gray-100 hover:text-gray-600">✕</button></div>
    <div className="mb-5 flex gap-1 border-b"><button onClick={() => setTab("summary")} className={"border-b-2 px-4 py-2 text-sm font-semibold " + (tab === "summary" ? "border-indigo-600 text-indigo-700" : "border-transparent text-gray-400 hover:text-gray-700")}>Resumo e histórico</button><button onClick={() => setTab("dcf")} className={"border-b-2 px-4 py-2 text-sm font-semibold " + (tab === "dcf" ? "border-indigo-600 text-indigo-700" : "border-transparent text-gray-400 hover:text-gray-700")}>Fluxo de Caixa Descontado</button></div>
    {tab === "summary" ? <SummaryPanel row={row}/> : <DcfPanel row={row}/>} 
  </div></div>;
}

function getDataUrl(filename) {
  const basePath = window.location.pathname.endsWith("/") ? window.location.pathname : window.location.pathname.replace(/[^/]+$/, "");
  const url = new URL("data/" + filename, window.location.origin + basePath);
  url.searchParams.set("v", new Date().toISOString().slice(0, 10));
  return url.toString();
}

function App() {
  const [dados, setDados] = useState(null);
  const [historico, setHistorico] = useState({ companies: {}, data_coleta: "seed" });
  const [erro, setErro] = useState(null);
  const [historyWarning, setHistoryWarning] = useState(null);
  const [search, setSearch] = useState("");
  const [sortKey, setSortKey] = useState("rankScore");
  const [sortAsc, setSortAsc] = useState(false);
  const [detail, setDetail] = useState(null);
  const [soNovoMercado, setSoNovoMercado] = useState(false);
  const [soComHistorico, setSoComHistorico] = useState(false);
  const [setorSelecionado, setSetorSelecionado] = useState("");
  const [atividadeSelecionada, setAtividadeSelecionada] = useState("");

  useEffect(() => {
    fetch(getDataUrl("latest.json")).then(response => { if (!response.ok) throw new Error("HTTP " + response.status); return response.json(); }).then(setDados).catch(error => setErro(error.message));
    fetch(getDataUrl("history.json")).then(response => { if (!response.ok) throw new Error("HTTP " + response.status); return response.json(); }).then(setHistorico).catch(error => setHistoryWarning(error.message));
  }, []);

  const enriched = useMemo(() => !dados?.rows ? [] : dados.rows.map(row => computeValuation({ ...row, setor: row.setor || "Não classificado", atividade: row.atividade || "Não classificada", history: historico.companies?.[row.papel] || null })), [dados, historico]);
  const setores = useMemo(() => [...new Set(enriched.map(row => row.setor).filter(Boolean))].sort((a, b) => a.localeCompare(b, "pt-BR")), [enriched]);
  const atividades = useMemo(() => [...new Set((setorSelecionado ? enriched.filter(row => row.setor === setorSelecionado) : enriched).map(row => row.atividade).filter(Boolean))].sort((a, b) => a.localeCompare(b, "pt-BR")), [enriched, setorSelecionado]);

  useEffect(() => { if (atividadeSelecionada && !atividades.includes(atividadeSelecionada)) setAtividadeSelecionada(""); }, [atividades, atividadeSelecionada]);
  useEffect(() => { setSortKey("rankScore"); setSortAsc(false); }, [setorSelecionado, atividadeSelecionada]);

  const filtered = useMemo(() => {
    const term = search.trim().toUpperCase();
    const result = enriched.filter(row => {
      const searchable = [row.papel, row.history?.company_name, row.setor, row.atividade].filter(Boolean).join(" ").toUpperCase();
      if (term && !searchable.includes(term)) return false;
      if (setorSelecionado && row.setor !== setorSelecionado) return false;
      if (atividadeSelecionada && row.atividade !== atividadeSelecionada) return false;
      if (soNovoMercado && row.segmento !== "NM") return false;
      if (soComHistorico && !row.historicoPronto) return false;
      return true;
    }).map(row => ({ ...row }));
    [...result].sort(compareRank).forEach((row, index) => { const target = result.find(item => item.papel === row.papel); if (target) target.posicaoFiltro = row.rankScore !== null ? index + 1 : null; });
    result.sort((a, b) => {
      if (sortKey === "rankScore") return sortAsc ? -compareRank(a, b) : compareRank(a, b);
      const va = a[sortKey], vb = b[sortKey];
      if (va === null || va === undefined) return 1;
      if (vb === null || vb === undefined) return -1;
      if (typeof va === "string") return sortAsc ? va.localeCompare(vb, "pt-BR") : vb.localeCompare(va, "pt-BR");
      return sortAsc ? va - vb : vb - va;
    });
    return result;
  }, [enriched, search, sortKey, sortAsc, soNovoMercado, soComHistorico, setorSelecionado, atividadeSelecionada]);

  function toggleSort(key) { if (key === sortKey) setSortAsc(!sortAsc); else { setSortKey(key); setSortAsc(key === "papel" || key === "setor"); } }
  function clearFilters() { setSearch(""); setSetorSelecionado(""); setAtividadeSelecionada(""); setSoNovoMercado(false); setSoComHistorico(false); setSortKey("rankScore"); setSortAsc(false); }

  if (erro) return <div className="mx-auto mt-16 max-w-md rounded-xl border border-red-200 bg-red-50 p-6 text-center"><p className="font-semibold text-red-700">Não foi possível carregar data/latest.json</p><p className="mt-2 text-sm text-red-600">{erro}</p></div>;
  if (!dados) return <div className="mt-16 text-center text-gray-400">Carregando…</div>;

  const nCompra = filtered.filter(row => row.recomendacao === "Compra").length;
  const nVenda = filtered.filter(row => row.recomendacao === "Venda").length;
  const nRebaixados = filtered.filter(row => row.alerta).length;
  const nHistorico = filtered.filter(row => row.historicoPronto).length;
  const hasFilters = Boolean(search || setorSelecionado || atividadeSelecionada || soNovoMercado || soComHistorico);

  return <div className="min-h-screen p-4 md:p-6"><div className="mx-auto max-w-screen-2xl">
    <header className="mb-5"><div className="flex flex-col gap-3 md:flex-row md:items-end md:justify-between"><div><h1 className="text-2xl font-bold text-gray-900">📈 Monitor IBOV</h1><p className="mt-1 text-sm text-gray-500">Mercado: {dados.data_coleta === "seed" ? "—" : new Date(dados.data_coleta + "T12:00:00").toLocaleDateString("pt-BR")} · Histórico CVM: {historico.data_coleta === "seed" ? "aguardando primeira coleta" : new Date(historico.data_coleta + "T12:00:00").toLocaleDateString("pt-BR")}</p></div><input type="text" placeholder="🔍 Ticker, empresa ou setor..." value={search} onChange={event => setSearch(event.target.value)} className="w-full rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm outline-none focus:border-emerald-500 md:w-72"/></div>
      <div className="mt-4 grid gap-3 rounded-xl border border-gray-200 bg-white p-4 shadow-sm sm:grid-cols-2 lg:grid-cols-5"><label className="text-xs font-semibold text-gray-500">Setor<select value={setorSelecionado} onChange={event => { setSetorSelecionado(event.target.value); setAtividadeSelecionada(""); }} className="mt-1 w-full rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm font-normal text-gray-700"><option value="">Todos os setores</option>{setores.map(setor => <option key={setor} value={setor}>{setor}</option>)}</select></label><label className="text-xs font-semibold text-gray-500">Atividade<select value={atividadeSelecionada} onChange={event => setAtividadeSelecionada(event.target.value)} className="mt-1 w-full rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm font-normal text-gray-700"><option value="">Todas as atividades</option>{atividades.map(atividade => <option key={atividade} value={atividade}>{atividade}</option>)}</select></label><label className="flex cursor-pointer items-center gap-2 self-end rounded-lg border border-gray-200 px-3 py-2 text-sm text-gray-600"><input type="checkbox" checked={soNovoMercado} onChange={event => setSoNovoMercado(event.target.checked)}/> 🛡 Só Novo Mercado</label><label className="flex cursor-pointer items-center gap-2 self-end rounded-lg border border-gray-200 px-3 py-2 text-sm text-gray-600"><input type="checkbox" checked={soComHistorico} onChange={event => setSoComHistorico(event.target.checked)}/> ≥ {HISTORICO_MIN_TRIMESTRES} trimestres</label><button onClick={clearFilters} disabled={!hasFilters} className="self-end rounded-lg border border-gray-300 px-3 py-2 text-sm font-medium text-gray-600 disabled:opacity-40">Limpar filtros</button></div>
    </header>
    {historyWarning && <div className="mb-4 rounded-lg border border-amber-200 bg-amber-50 p-3 text-xs text-amber-700">Histórico CVM indisponível ({historyWarning}).</div>}
    <div className="mb-6 grid grid-cols-2 gap-4 sm:grid-cols-5"><div className="rounded-xl border bg-white p-4 shadow-sm"><div className="text-sm text-gray-500">Exibidas</div><div className="mt-1 text-2xl font-bold">{filtered.length}</div><div className="text-xs text-gray-400">de {enriched.length}</div></div><div className="rounded-xl border border-indigo-200 bg-indigo-50 p-4"><div className="text-sm text-indigo-700">Com histórico</div><div className="mt-1 text-2xl font-bold text-indigo-700">{nHistorico}</div></div><div className="rounded-xl border border-emerald-200 bg-emerald-50 p-4"><div className="text-sm text-emerald-700">Compra</div><div className="mt-1 text-2xl font-bold text-emerald-700">{nCompra}</div></div><div className="rounded-xl border border-amber-200 bg-amber-50 p-4"><div className="text-sm text-amber-700">Rebaixadas ⚠</div><div className="mt-1 text-2xl font-bold text-amber-700">{nRebaixados}</div></div><div className="rounded-xl border border-red-200 bg-red-50 p-4"><div className="text-sm text-red-700">Venda</div><div className="mt-1 text-2xl font-bold text-red-700">{nVenda}</div></div></div>
    <div className="mb-4 rounded-lg border border-blue-100 bg-blue-50 p-3 text-xs text-blue-800">ℹ O ranking mantém a melhor combinação de qualidade e preço. Abra o sinal ou o ticker para acessar as abas <strong>Resumo e histórico</strong> e <strong>Fluxo de Caixa Descontado</strong>. O FCD tem premissas editáveis e, por enquanto, não altera o ranking geral.</div>
    <div className="overflow-x-auto rounded-xl border border-gray-200 bg-white shadow-sm"><table className="w-full min-w-max text-sm"><thead><tr className="border-b bg-gray-50">{COLUMNS.map(col => <th key={col.key} onClick={() => toggleSort(col.key)} className="cursor-pointer whitespace-nowrap px-3 py-3 text-left font-semibold text-gray-600 hover:bg-gray-100">{col.label}{sortKey === col.key ? (sortAsc ? " ↑" : " ↓") : ""}</th>)}</tr></thead><tbody>{filtered.map(row => <tr key={row.papel} className="border-b last:border-0 hover:bg-emerald-50">{COLUMNS.map(col => <td key={col.key} className={"whitespace-nowrap px-3 py-2.5 " + valueColor(col.key, row[col.key])}>{col.fmt === "badge" ? <RecomendacaoBadge row={row} onDetail={setDetail}/> : col.fmt === "ticker" ? <button onClick={() => setDetail(row)} className="font-semibold text-indigo-700 hover:underline">{row.papel}</button> : col.fmt === "quality" ? <QualityBar score={row.qualidade}/> : col.fmt === "history" ? <HistoryBadge row={row}/> : col.fmt === "setor" ? <SectorCell row={row}/> : col.fmt === "segmento" ? <SegmentoBadge value={row.segmento}/> : col.fmt === "score" ? <ScoreBadge value={row.rankScore} rank={row.posicaoFiltro}/> : formatValue(row[col.key], col.fmt)}</td>)}</tr>)}{filtered.length === 0 && <tr><td colSpan={COLUMNS.length} className="px-3 py-8 text-center text-gray-400">Nenhum ticker encontrado.</td></tr>}</tbody></table></div>
    <p className="mt-4 text-xs text-gray-400">Ferramenta educacional — <strong>não constitui recomendação de investimento</strong>. Dados atuais: Fundamentus. Histórico e fluxo de caixa: CVM.</p>
    <DetailModal row={detail} onClose={() => setDetail(null)}/>
  </div></div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
