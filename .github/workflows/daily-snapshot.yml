name: Snapshot diário Fundamentus
on:
  schedule:
    - cron: "0 21 * * 1-5"   # 21h UTC = 18h BRT, dias úteis
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scraper/fundamentus_snapshot.py"
      - "scraper/ibov.txt"
      - "scraper/segmentos.csv"
      - "scraper/classificacao_setorial.csv"
      - ".github/workflows/daily-snapshot.yml"

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests beautifulsoup4
      - run: python scraper/fundamentus_snapshot.py
      - name: Commit snapshot
        run: |
          git config user.name "bot-snapshot"
          git config user.email "bot@users.noreply.github.com"
          git add data/latest.json
          git diff --staged --quiet || git commit -m "snapshot $(date -u +%F)"
          git push
