name: Snapshot diário Fundamentus
on:
  schedule:
    - cron: "0 21 * * 1-5"   # 21h UTC = 18h BRT, dias úteis
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scraper/fundamentus_snapshot.py"
      - "scraper/sector_context.py"
      - "scraper/news_context.py"
      - "scraper/run_news_context.py"
      - "scraper/deepseek_analysis.py"
      - "scraper/contextual_analysis.py"
      - "scraper/run_contextual_analysis.py"
      - "scraper/ibov.txt"
      - "scraper/segmentos.csv"
      - "scraper/classificacao_setorial.csv"
      - ".github/workflows/daily-snapshot.yml"

concurrency:
  group: daily-snapshot
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Coletar snapshot do Fundamentus
        run: python scraper/fundamentus_snapshot.py
      - name: Calcular comparação setorial
        run: python scraper/sector_context.py
      - name: Atualizar contexto e análises DeepSeek
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_READER_MODEL: ${{ vars.DEEPSEEK_READER_MODEL || 'deepseek-v4-flash' }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-pro' }}
          DEEPSEEK_THINKING: ${{ vars.DEEPSEEK_THINKING || 'enabled' }}
          DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
        run: |
          if [ -z "$DEEPSEEK_API_KEY" ]; then
            echo "::warning::DEEPSEEK_API_KEY não configurada; serão atualizados somente os metadados públicos das notícias."
            python scraper/run_news_context.py --metadata-only --max-new-articles 0
          else
            python scraper/run_news_context.py --max-new-articles 15
            python scraper/run_contextual_analysis.py
          fi
      - name: Commit snapshot, contextos e análises
        run: |
          git config user.name "bot-snapshot"
          git config user.email "bot@users.noreply.github.com"
          git add data/latest.json data/sector_context.json data/news_context.json data/analysis.json
          git diff --staged --quiet || git commit -m "snapshot $(date -u +%F)"
          git push
