name: Snapshot diário Fundamentus
on:
  schedule:
    - cron: "0 21 * * 1-5"   # 21h UTC = 18h BRT, dias úteis
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scraper/fundamentus_snapshot.py"
      - "scraper/deepseek_analysis.py"
      - "scraper/ibov.txt"
      - "scraper/segmentos.csv"
      - "scraper/classificacao_setorial.csv"
      - ".github/workflows/daily-snapshot.yml"

concurrency:
  group: daily-snapshot
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Coletar snapshot do Fundamentus
        run: python scraper/fundamentus_snapshot.py
      - name: Atualizar análises com DeepSeek V4
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-pro' }}
          DEEPSEEK_THINKING: ${{ vars.DEEPSEEK_THINKING || 'enabled' }}
        run: |
          if [ -z "$DEEPSEEK_API_KEY" ]; then
            echo "::warning::DEEPSEEK_API_KEY não configurada; o snapshot será atualizado sem regenerar os textos."
          else
            python scraper/deepseek_analysis.py
          fi
      - name: Commit snapshot e análises
        run: |
          git config user.name "bot-snapshot"
          git config user.email "bot@users.noreply.github.com"
          git add data/latest.json data/analysis.json
          git diff --staged --quiet || git commit -m "snapshot $(date -u +%F)"
          git push
