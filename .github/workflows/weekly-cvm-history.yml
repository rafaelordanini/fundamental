name: Histórico semanal CVM
on:
  schedule:
    - cron: "30 12 * * 0" # domingo, 09h30 BRT
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scraper/cvm_history.py"
      - "scraper/cvm_cashflow.py"
      - "scraper/run_cvm_history.py"
      - "scraper/sector_context.py"
      - "scraper/news_context.py"
      - "scraper/run_news_context.py"
      - "scraper/deepseek_analysis.py"
      - "scraper/contextual_analysis.py"
      - "scraper/cvm_overrides.csv"
      - "scraper/ibov.txt"
      - ".github/workflows/weekly-cvm-history.yml"

concurrency:
  group: cvm-history
  cancel-in-progress: false

jobs:
  history:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Coletar histórico CVM
        run: python scraper/run_cvm_history.py --years 10
      - name: Validar histórico e fluxo de caixa
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path("data/history.json").read_text(encoding="utf-8"))
          if data.get("data_coleta") == "seed" or data.get("total", 0) == 0:
              raise SystemExit("Histórico continua vazio após a coleta")
          companies = data.get("companies", {})
          ready = sum(1 for item in companies.values() if item.get("summary", {}).get("quarters_count", 0) >= 8)
          cashflow = sum(1 for item in companies.values() if item.get("summary", {}).get("cashflow_quarters_count", 0) >= 8)
          positive = sum(1 for item in companies.values() if (item.get("summary", {}).get("normalized_free_cash_flow_million") or 0) > 0)
          print(f"Empresas: {len(companies)}; histórico >= 8 tri: {ready}; DFC >= 8 tri: {cashflow}; FCL normalizado positivo: {positive}")
          if ready < 10:
              raise SystemExit("Cobertura insuficiente: menos de 10 empresas com 8 trimestres")
          if cashflow < 10:
              raise SystemExit("Cobertura insuficiente: menos de 10 empresas com fluxo de caixa")
          PY
      - name: Calcular comparação setorial
        run: python scraper/sector_context.py
      - name: Atualizar notícias e análise final
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_READER_MODEL: ${{ vars.DEEPSEEK_READER_MODEL || 'deepseek-v4-flash' }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-pro' }}
          DEEPSEEK_THINKING: ${{ vars.DEEPSEEK_THINKING || 'enabled' }}
          DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
        run: |
          if [ -z "$DEEPSEEK_API_KEY" ]; then
            echo "::warning::DEEPSEEK_API_KEY não configurada; contexto setorial atualizado sem análise de notícias."
            python scraper/run_news_context.py --metadata-only --max-new-articles 0
          else
            python scraper/run_news_context.py --max-new-articles 40
            python scraper/contextual_analysis.py
          fi
      - name: Commit histórico, contextos e análises
        run: |
          git config user.name "bot-history"
          git config user.email "bot@users.noreply.github.com"
          git add data/history.json data/sector_context.json data/news_context.json data/analysis.json
          git diff --staged --quiet || git commit -m "history $(date -u +%F)"
          git push
