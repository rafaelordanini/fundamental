name: Histórico semanal CVM
on:
  schedule:
    - cron: "30 12 * * 0" # domingo, 09h30 BRT
  workflow_dispatch:

concurrency:
  group: cvm-history
  cancel-in-progress: false

jobs:
  history:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python scraper/cvm_history.py --years 6
      - name: Commit histórico
        run: |
          git config user.name "bot-history"
          git config user.email "bot@users.noreply.github.com"
          git add data/history.json
          git diff --staged --quiet || git commit -m "history $(date -u +%F)"
          git push
