name: Análises DeepSeek V4
on:
  workflow_dispatch:
    inputs:
      force:
        description: "Regenerar inclusive análises cujo hash não mudou"
        required: false
        default: false
        type: boolean
      ticker:
        description: "Ticker específico, por exemplo PETR4; vazio processa todos os alterados"
        required: false
        type: string
      max_news:
        description: "Máximo de novas matérias lidas pelo V4 Flash"
        required: false
        default: "20"
        type: string

concurrency:
  group: deepseek-analysis
  cancel-in-progress: false

jobs:
  analyse:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Verificar chave e modelos da API
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
        run: |
          if [ -z "$DEEPSEEK_API_KEY" ]; then
            echo "Configure o secret DEEPSEEK_API_KEY em Settings > Secrets and variables > Actions."
            exit 1
          fi
          python - <<'PY'
          import os, requests
          response = requests.get(
              os.environ["DEEPSEEK_BASE_URL"].rstrip("/") + "/models",
              headers={"Authorization": "Bearer " + os.environ["DEEPSEEK_API_KEY"]},
              timeout=30,
          )
          if response.status_code >= 400:
              raise SystemExit(f"Falha ao consultar modelos: HTTP {response.status_code} {response.text[:1000]}")
          models = [item.get("id") for item in response.json().get("data", [])]
          print("Modelos disponíveis:", models)
          required = {"deepseek-v4-flash", "deepseek-v4-pro"}
          missing = sorted(required.difference(models))
          if missing:
              raise SystemExit(f"Modelos não disponíveis para esta chave: {missing}")
          PY
      - name: Calcular comparação setorial
        run: python scraper/sector_context.py
      - name: Ler notícias com DeepSeek V4 Flash
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_READER_MODEL: ${{ vars.DEEPSEEK_READER_MODEL || 'deepseek-v4-flash' }}
          DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
          MAX_NEWS: ${{ inputs.max_news }}
          TICKER_ANALYSIS: ${{ inputs.ticker }}
        run: |
          args=(--max-new-articles "${MAX_NEWS:-20}")
          if [ -n "$TICKER_ANALYSIS" ]; then args+=(--ticker "$TICKER_ANALYSIS"); fi
          python scraper/run_news_context.py "${args[@]}"
      - name: Gerar análise final com DeepSeek V4 Pro
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-pro' }}
          DEEPSEEK_THINKING: ${{ vars.DEEPSEEK_THINKING || 'enabled' }}
          DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
          FORCE_ANALYSIS: ${{ inputs.force }}
          TICKER_ANALYSIS: ${{ inputs.ticker }}
        run: |
          args=()
          if [ "$FORCE_ANALYSIS" = "true" ]; then args+=(--force); fi
          if [ -n "$TICKER_ANALYSIS" ]; then args+=(--ticker "$TICKER_ANALYSIS"); fi
          python scraper/contextual_analysis.py "${args[@]}"
      - name: Validar arquivo gerado
        run: python scraper/contextual_analysis.py --validate-only
      - name: Commit contextos e análises
        run: |
          git config user.name "bot-analysis"
          git config user.email "bot@users.noreply.github.com"
          git add data/sector_context.json data/news_context.json data/analysis.json
          git diff --staged --quiet || git commit -m "analysis DeepSeek V4 $(date -u +%F)"
          git push
